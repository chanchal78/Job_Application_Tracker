<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style/styles.css">
</head>
<body class="max-w-[1600px] mx-auto bg-[#F8FAFC] px-[150px] py-[50px]">
    <header>
        <h1 class="font-bold text-3xl text-black">Job Application Tracker</h1>
        <section class="grid grid-cols-3 gap-6 mt-6">
            <div class="bg-white rounded-lg shadow-sm">
                <div class="p-[20px]">
                    <p>Total</p>
                    <h4 id="total-job-amount" class="text-2xl font-bold text-black">0</h4>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow-sm">
                <div class="p-[20px]">
                    <p>Interview</p>
                    <h4 id="total-interview-amount" class="text-2xl font-bold text-green-500">0</h4>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow-sm">
                <div class="p-[20px]">
                    <p>Rejected</p>
                    <h4 id="total-rejected-amount" class="text-2xl text-red-500 font-bold">0</h4>
                </div>
            </div>
        </section>
        <hr class="border-[#E6E7E9] my-[15px]">
    </header>

    <main>
        <div class="flex justify-between mb-3">
            <div>
                <p class="text-xl font-semibold">Available Jobs</p>
            </div>
            <div id="available-job-count">0 jobs</div>
        </div>
        <div class="flex gap-3">
            <button id="all-tab-btn" class="rounded-sm px-10 py-1 shadow-sm bg-blue-600 text-white" onclick="switchTab('all')">All</button>
            <button id="interview-tab-btn" class="bg-white rounded-sm px-5 py-1 shadow-sm" onclick="switchTab('interview')">Interview</button>
            <button id="rejected-tab-btn" class="bg-white rounded-sm px-5 py-1 shadow-sm" onclick="switchTab('rejected')">Rejected</button>
        </div>

        <section id="job-section" class="grid grid-cols-1 gap-5 pt-5">
            <div class="cards flex flex-col gap-5 p-6 shadow-sm bg-white rounded-md">
                <div class="flex justify-between">
                    <div>
                        <h3 class="job-title text-xl">Mobile First Corp</h3>
                        <p class="text-gray-500">React Native Developer</p>
                    </div>
                    <button class="delete-icon size-8 flex justify-center text-center items-center border-gray-400 border rounded-4xl"><img src="images/icons8-delete-100.png" alt="Delete Icon" class="size-6"></button>
                </div>
                <div class="job-type">
                    <p class="text-gray-500">Remote • Full-time • $100,000 - $110,000</p>
                </div>
                <div class="flex flex-col gap-2">
                    <button class="status self-start bg-[#EEF4FF] rounded-md py-2 px-3">NOT APPLIED</button>
                    <p class="job-about text-gray-700">Develop high-performance mobile application using React Native for iOS and Android platforms.</p>
                </div>
                <div class="pair-btn flex gap-3">
                    <button class="interviewBtn py-1 px-3 text-green-600 border-green-600 border-2 rounded-md">INTERVIEW</button>
                    <button class="rejectedBtn py-1 px-3 text-red-600 border-red-600 border-2 rounded-md">REJECTED</button>
                </div>
            </div>
        </section>

    </main>

    <script src="js/main.js"></script>
</body>
</html>
