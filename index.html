<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style/styles.css">
</head>
<body class="max-w-[1600px] mx-auto bg-[#F8FAFC] px-[150px] py-[50px]">
    <header>
        <h1 class="font-bold text-3xl text-black">Job Application Tracker</h1>
        <section class="grid grid-cols-3 gap-6 mt-6">
            <div class="bg-white rounded-lg shadow-sm">
                <div class="p-[20px]">
                    <p>Total</p>
                    <h4 id="total-job-amount" class="text-2xl font-bold text-black">0</h4>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow-sm">
                <div class="p-[20px]">
                    <p>Interview</p>
                    <h4 id="total-interview-amount" class="text-2xl font-bold text-green-500">0</h4>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow-sm">
                <div class="p-[20px]">
                    <p>Rejected</p>
                    <h4 id="total-rejected-amount" class="text-2xl text-red-500 font-bold">0</h4>
                </div>
            </div>
        </section>
        <hr class="border-[#E6E7E9] my-[15px]">
    </header>

    <script src="js/main.js"></script>
</body>
</html>
